name: Build QGIS Plugin ZIP (manual)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Detect plugin directory (contains metadata.txt)
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # genau eine metadata.txt suchen (typisch für QGIS-Plugin)
          MAPFILE="$(find . -type f -name metadata.txt -not -path './.git/*')"

          COUNT="$(echo "$MAPFILE" | grep -c . || true)"
          if [ "$COUNT" -ne 1 ]; then
            echo "ERROR: Erwartet genau eine metadata.txt, gefunden: $COUNT" >&2
            echo "$MAPFILE" >&2
            exit 1
          fi

          PLUGIN_DIR="$(dirname "${MAPFILE#./}")"
          echo "plugin_dir=$PLUGIN_DIR" >> "$GITHUB_OUTPUT"

      - name: Read version from metadata.txt
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          META="${{ steps.detect.outputs.plugin_dir }}/metadata.txt"
          test -f "$META"

          VERSION="$(awk -F= '
            BEGIN{v=""}
            $1 ~ /^[[:space:]]*version[[:space:]]*$/ {
              v=$2
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
              print v
              exit
            }' "$META")"

          if [ -z "$VERSION" ]; then
            echo "ERROR: Keine Version in metadata.txt gefunden (version=...)." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create QGIS plugin zip
        id: package
        shell: bash
        run: |
          set -euo pipefail

          PLUGIN_DIR="${{ steps.detect.outputs.plugin_dir }}"
          VERSION="${{ steps.meta.outputs.version }}"
          BASE="$(basename "$PLUGIN_DIR")"
          STAMP="$(TZ=Europe/Berlin date +'%Y%m%d-%H%M')"

          ZIP_FILE="${BASE}_v${VERSION}_packedforQGIS-${STAMP}.zip"

          # --- LICENSE & README temporär beilegen ---
          SRC_LICENSE="$GITHUB_WORKSPACE/LICENSE"
          DST_LICENSE="$GITHUB_WORKSPACE/${PLUGIN_DIR}/LICENSE"

          SRC_README=""
          for f in README.md Readme.md readme.md; do
            if [ -f "$GITHUB_WORKSPACE/$f" ]; then
              SRC_README="$GITHUB_WORKSPACE/$f"
              break
            fi
          done
          DST_README="$GITHUB_WORKSPACE/${PLUGIN_DIR}/README.md"

          cleanup() {
            rm -f "$DST_LICENSE" "$DST_README" || true
          }
          trap cleanup EXIT

          if [ -f "$SRC_LICENSE" ]; then
            cp "$SRC_LICENSE" "$DST_LICENSE"
          fi

          if [ -n "$SRC_README" ]; then
            cp "$SRC_README" "$DST_README"
          fi

          # --- ZIP bauen (Root folder = Plugin folder) ---
          PARENT="$(dirname "$PLUGIN_DIR")"
          FOLDER="$(basename "$PLUGIN_DIR")"

          cd "$PARENT"
          zip -r "$GITHUB_WORKSPACE/$ZIP_FILE" "$FOLDER" \
            -x "**/.git/**" \
               "**/__pycache__/**" \
               "**/*.pyc" \
               "**/.DS_Store" \
               "**/__MACOSX/**"

          echo "zip_path=$GITHUB_WORKSPACE/$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload plugin zip as non-zipped artifact
        uses: actions/upload-artifact@v7
        with:
          name: qgis-plugin-${{ steps.meta.outputs.version }}
          path: ${{ steps.package.outputs.zip_path }}
          archive: false
          retention-days: 14
